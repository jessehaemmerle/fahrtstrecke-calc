<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahrtstrecken-Rechner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h1>Fahrtstrecken-Rechner</h1>
        <p>Wie weit komme ich in einer bestimmten Zeit?</p>
    </div>

    <!-- Startpunkt -->
    <div class="section">
        <div class="section-title">Startpunkt</div>
        <div class="input-row">
            <input type="text" id="search-input" placeholder="Adresse suchen …" />
            <button class="btn btn-ghost" id="search-btn" title="Suchen">🔍</button>
            <button class="btn btn-ghost" id="geo-btn" title="Mein Standort">📍</button>
        </div>
        <div class="search-dropdown" id="search-dropdown"></div>
        <div class="location-badge" id="location-badge">
            ✓ <span id="location-text"></span>
        </div>
        <div class="hint">Oder direkt auf die Karte klicken.</div>
    </div>

    <!-- Einstellungen -->
    <div class="section">
        <div class="section-title">Einstellungen</div>

        <label>Verkehrsmittel</label>
        <div class="mode-grid">
            <div class="mode-btn active" data-mode="driving-car">
                <span class="mode-icon">🚗</span>Auto
            </div>
            <div class="mode-btn" data-mode="cycling-regular">
                <span class="mode-icon">🚲</span>Fahrrad
            </div>
            <div class="mode-btn" data-mode="foot-walking">
                <span class="mode-icon">🚶</span>Zu&nbsp;Fuß
            </div>
        </div>

        <div style="margin-top: 14px;">
            <label for="time-input">Maximale Reisezeit</label>
            <div class="time-row">
                <input type="number" id="time-input" value="30" min="1" />
                <span class="time-unit">Minuten</span>
            </div>
        </div>

        <div class="toggle-row" id="toggle-row">
            <div class="toggle" id="multi-toggle"></div>
            <span>Mehrere Zeitringe</span>
        </div>
        <div class="sub-settings" id="sub-settings">
            <label>Intervall-Schritt</label>
            <div class="time-row">
                <input type="number" id="step-input" value="15" min="5" />
                <span class="time-unit">Minuten</span>
            </div>
        </div>
    </div>

    <!-- Berechnen -->
    <div class="section">
        <button class="btn btn-primary" id="calc-btn" disabled>
            Isochrone berechnen
        </button>
        <div class="status" id="status"></div>
    </div>

    <!-- Legende -->
    <div class="section" id="legend-section" style="display:none;">
        <div class="section-title">Legende</div>
        <div id="legend-content"></div>
        <button class="btn btn-ghost" id="clear-btn" style="margin-top:10px;width:100%;">
            Ergebnis löschen
        </button>
    </div>

    <div class="sidebar-footer">
        Routing: Valhalla / OpenStreetMap &nbsp;·&nbsp; Karte: © OpenStreetMap-Mitwirkende
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
