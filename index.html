<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fahrtstrecken-Rechner – Wie weit komme ich in einer bestimmten Zeit?</title>
    <meta name="description" content="Kostenloser Fahrtstrecken-Rechner: Berechne auf der Karte, wie weit du mit Auto, Fahrrad oder zu Fuß in einer bestimmten Zeit kommst – auf echten Straßen, nicht als Luftlinie." />
    <meta name="keywords" content="Fahrtstrecke, Isochrone, Erreichbarkeit, Karte, Reisezeit, Auto, Fahrrad, OpenStreetMap" />
    <meta name="author" content="Jesse Hämmerle" />
    <link rel="canonical" href="https://fahrtstrecke.streckenrechner.info/" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fahrtstrecke.streckenrechner.info/" />
    <meta property="og:title" content="Fahrtstrecken-Rechner – Wie weit komme ich?" />
    <meta property="og:description" content="Berechne auf der Karte, wie weit du mit Auto, Fahrrad oder zu Fuß in einer bestimmten Zeit kommst – auf echten Straßen." />
    <meta property="og:locale" content="de_AT" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Fahrtstrecken-Rechner" />
    <meta name="twitter:description" content="Wie weit komme ich in einer bestimmten Zeit? Isochrone auf echten Straßen." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Fahrtstrecken-Rechner",
        "description": "Berechne, wie weit du mit Auto, Fahrrad oder zu Fuß in einer bestimmten Zeit kommst.",
        "url": "https://fahrtstrecke.streckenrechner.info/",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "Web",
        "inLanguage": "de",
        "isAccessibleForFree": true,
        "author": {
            "@type": "Person",
            "name": "Jesse Hämmerle"
        }
    }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h1>Fahrtstrecken-Rechner</h1>
        <p>Wie weit komme ich in einer bestimmten Zeit?</p>
    </div>

    <!-- Startpunkt -->
    <div class="section">
        <div class="section-title">Startpunkt</div>
        <div class="input-row">
            <input type="text" id="search-input" placeholder="Adresse suchen …" aria-label="Adresse suchen" />
            <button class="btn btn-ghost" id="search-btn" title="Suchen" aria-label="Suchen">🔍</button>
            <button class="btn btn-ghost" id="geo-btn" title="Mein Standort" aria-label="Meinen Standort verwenden">📍</button>
        </div>
        <div class="search-dropdown" id="search-dropdown" role="listbox" aria-label="Suchergebnisse"></div>
        <div class="location-badge" id="location-badge" aria-live="polite">
            ✓ <span id="location-text"></span>
        </div>
        <div class="hint">Oder direkt auf die Karte klicken.</div>
    </div>

    <!-- Einstellungen -->
    <div class="section">
        <div class="section-title">Einstellungen</div>

        <label>Verkehrsmittel</label>
        <div class="mode-grid" role="group" aria-label="Verkehrsmittel wählen">
            <div class="mode-btn active" data-mode="driving-car" role="button" tabindex="0" aria-pressed="true">
                <span class="mode-icon" aria-hidden="true">🚗</span>Auto
            </div>
            <div class="mode-btn" data-mode="cycling-regular" role="button" tabindex="0" aria-pressed="false">
                <span class="mode-icon" aria-hidden="true">🚲</span>Fahrrad
            </div>
            <div class="mode-btn" data-mode="foot-walking" role="button" tabindex="0" aria-pressed="false">
                <span class="mode-icon" aria-hidden="true">🚶</span>Zu&nbsp;Fuß
            </div>
        </div>

        <div style="margin-top: 14px;">
            <label for="time-input">Maximale Reisezeit</label>
            <div class="time-row">
                <input type="number" id="time-input" value="30" min="1" max="999" aria-label="Reisezeit" />
                <div class="unit-toggle" role="group" aria-label="Zeiteinheit">
                    <button class="unit-btn active" data-unit="min" aria-pressed="true">min</button>
                    <button class="unit-btn" data-unit="h" aria-pressed="false">h</button>
                </div>
            </div>
        </div>

        <div class="toggle-row" id="toggle-row" role="button" tabindex="0" aria-pressed="false">
            <div class="toggle" id="multi-toggle" aria-hidden="true"></div>
            <span>Mehrere Zeitringe</span>
        </div>
        <div class="sub-settings" id="sub-settings">
            <label for="step-input">Intervall-Schritt</label>
            <div class="time-row">
                <input type="number" id="step-input" value="15" min="5" aria-label="Intervall in Minuten" />
                <span class="time-unit">Minuten</span>
            </div>
        </div>
    </div>

    <!-- Berechnen -->
    <div class="section">
        <button class="btn btn-primary" id="calc-btn" disabled aria-disabled="true">
            Isochrone berechnen
        </button>
        <div class="status" id="status" role="status" aria-live="polite"></div>
    </div>

    <!-- Legende -->
    <div class="section" id="legend-section" style="display:none;">
        <div class="section-title">Legende</div>
        <div id="legend-content"></div>
        <button class="btn btn-ghost" id="clear-btn" style="margin-top:10px;width:100%;">
            Ergebnis löschen
        </button>
    </div>

    <div class="sidebar-footer">
        <a class="donate-btn" href="https://www.paypal.com/paypalme/jessehaemmerle" target="_blank" rel="noopener" aria-label="Per PayPal spenden">
            ♥ Spenden
        </a>
        <div class="footer-credits">
            Routing: Valhalla / OpenStreetMap &nbsp;·&nbsp; Karte: © OpenStreetMap-Mitwirkende
        </div>
    </div>
</div>

<div id="map" role="application" aria-label="Interaktive Karte"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
