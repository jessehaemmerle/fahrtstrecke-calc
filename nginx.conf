server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy zum lokalen Valhalla-Container (kein Zeitlimit).
    # resolver + Variable verhindert, dass nginx beim Start ohne Valhalla abbricht.
    location /isochrone {
        resolver           127.0.0.11 valid=10s;
        set $upstream      http://valhalla:8002;
        proxy_pass         $upstream/isochrone;
        proxy_read_timeout 300s;
    }
}
