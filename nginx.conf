server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Stadia Maps Valhalla – API-Key wird serverseitig ergänzt, nie an den Browser übertragen.
    # resolver + Variable verhindert nginx-Absturz wenn der Host beim Start nicht auflösbar ist.
    location /isochrone {
        resolver           1.1.1.1 valid=30s;
        set $stadia        https://valhalla1.stadiamaps.com;
        proxy_pass         $stadia/isochrone?api_key=${STADIA_API_KEY};
        proxy_ssl_server_name on;
        proxy_set_header   Host valhalla1.stadiamaps.com;
        proxy_read_timeout 300s;
    }
}
